services:
  - type: web
    name: vidi-gestion-documental
    runtime: docker
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: STORAGE_PROVIDER
        value: local_onedrive
      - key: LOCAL_STORAGE_ENABLED
        value: true
      - key: STORAGE_DIR
        value: storage
      - key: DATABASE_URL
        fromDatabase:
          name: vidi-documentos-db
          property: connectionString
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: ONEDRIVE_DRIVE_ID
        sync: false
      - key: ONEDRIVE_BASE_FOLDER
        value: VIDI_DOCUMENTOS
    disk:
      name: vidi-document-storage
      mountPath: /app/storage
      sizeGB: 10

databases:
  - name: vidi-documentos-db
    plan: starter
