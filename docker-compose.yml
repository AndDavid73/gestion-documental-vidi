services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./database:/app/database
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: documentos
      POSTGRES_USER: vidi
      POSTGRES_PASSWORD: vidi_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

